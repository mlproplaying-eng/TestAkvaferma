<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Акваферма</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* Только убрать старую фиолетово-зелёную плашку */
.bg-gradient-to-r,
.bg-gradient-to-l,
[class*="from-purple"],
[class*="to-green"]{
  display:none !important;
}
</style>


<style>
/* Полностью переработанное прозрачное меню */
.brand-header{
  position: fixed !important;
  top: 14px !important;
  left: 18px !important;
  right: 18px !important;
  height: 92px !important;
  border-radius: 26px !important;
  background: rgba(255,255,255,.16) !important;
  backdrop-filter: blur(24px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
  border: 1px solid rgba(255,255,255,.22) !important;
  box-shadow: 0 10px 40px rgba(0,0,0,.12) !important;
}

/* Лого заметнее и больше */
.brand-logo img{
  height: 82px !important;
  width: auto !important;
  opacity: 1 !important;
  filter:
    drop-shadow(0 6px 20px rgba(0,0,0,.22))
    contrast(1.08)
    saturate(1.08) !important;
}

/* Кнопки в стеклянном стиле */
.brand-links{
  gap:18px !important;
}

.brand-btn{
  background: rgba(255,255,255,.12) !important;
  border: 1px solid rgba(255,255,255,.22) !important;
  backdrop-filter: blur(18px) !important;
  -webkit-backdrop-filter: blur(18px) !important;
  border-radius: 18px !important;
  padding: 14px 22px !important;
  font-size: 15px !important;
  font-weight: 700 !important;
  box-shadow: 0 8px 24px rgba(0,0,0,.08) !important;
}

.brand-btn:hover{
  transform: translateY(-2px) scale(1.02);
}

/* Общая прозрачность для внутренних меню сайта */
nav,
header,
[role="navigation"],
[class*="menu"],
[class*="nav"],
[class*="header"]{
  background: rgba(255,255,255,.08) !important;
  backdrop-filter: blur(16px) !important;
  border-color: rgba(255,255,255,.12) !important;
}
</style>


<style>
/* Кнопка менеджера без номера */
.manager-btn small{
  display:none !important;
}

.manager-btn{
  border-radius: 999px !important;
  padding: 18px 24px !important;
  font-size: 17px !important;
  backdrop-filter: blur(12px);
}

/* Красивые кнопки соцсетей */
.brand-links{
  gap: 16px !important;
}

.brand-btn{
  position: relative;
  overflow: hidden;
  border-radius: 999px !important;
  padding: 14px 24px !important;
  background: rgba(255,255,255,.14) !important;
  border: 1px solid rgba(255,255,255,.24) !important;
  backdrop-filter: blur(18px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(18px) saturate(180%) !important;
  box-shadow: 0 8px 24px rgba(0,0,0,.10) !important;
  transition: .25s ease !important;
  font-weight: 700 !important;
  letter-spacing: .2px;
}

.brand-btn:hover{
  transform: translateY(-3px) scale(1.03) !important;
  box-shadow: 0 12px 28px rgba(0,0,0,.14) !important;
}




</style>


<style>
.brand-btn{
  color:white !important;
  border:none !important;
  box-shadow: 0 10px 28px rgba(0,0,0,.14) !important;
  font-weight:700 !important;
}

/* WhatsApp */
.brand-btn:first-child{
  background: linear-gradient(135deg,#25D366,#128C7E) !important;
}

/* Instagram */
.brand-btn:last-child{
  background: linear-gradient(135deg,#833AB4,#C13584,#E1306C,#F77737,#FCAF45) !important;
}

.brand-btn:hover{
  transform: translateY(-3px) scale(1.04) !important;
  filter: brightness(1.05);
}
</style>

</head>
<body class="bg-gray-100">

<style>
body {
  padding-top: 92px !important;
}

.brand-bg {
 position:fixed;
 inset:0;
 z-index:-1;
 pointer-events:none;
}
.brand-bg img {
 width:100%;
 height:100%;
 object-fit:contain;
 opacity:.07;
}

.brand-header {
 position:fixed;
 top:0;
 left:0;
 right:0;
 height:92px;
 background:rgba(255,255,255,.92);
 backdrop-filter: blur(10px);
 z-index:999999;
 border-bottom:1px solid rgba(0,0,0,.08);
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:0 28px;
 box-shadow:0 2px 18px rgba(0,0,0,.06);
}

.brand-logo img {
 height:60px;
 width:auto;
}

.brand-links {
 display:flex;
 gap:14px;
 align-items:center;
}

.brand-btn {
 text-decoration:none;
 color:#111;
 font-weight:700;
 padding:12px 18px;
 border-radius:16px;
 background:white;
 border:1px solid rgba(0,0,0,.08);
 box-shadow:0 4px 12px rgba(0,0,0,.08);
 transition:.2s;
 font-family:Arial,sans-serif;
}
.brand-btn:hover {
 transform:translateY(-2px);
}
</style>
